name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install ollama pytest ruff
      - name: Lint (ubuntu, py3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: ruff check gemma_agent.py gemma_agent_v2.py scripts || true
      - name: Import smoke
        run: |
          python -c "import ast; ast.parse(open('gemma_agent.py').read()); ast.parse(open('gemma_agent_v2.py').read())"
          python -c "import ast; ast.parse(open('scripts/vtu_to_gemma.py').read())"
